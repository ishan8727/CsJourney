<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debounce Simple</title>
    <style>
        .loader{
            height: 10px; width: 10px; border-radius: 100%;
        }
    </style>
</head>
<body>

<div style="display: flex; flex-direction: row">
    <label>Enter name to search:</label>
    <div style="display: flex; align-items: center; margin-left: 5px">
        <input class="inputbox" style="margin-right: 5px;">
        <div class="loader"></div>
    </div>
</div>

<script>

    // ---------------- STATE ----------------
    let loadingState = 'pending';
    let currentController = null;
    let debounceTimer = null;

    const loader = document.querySelector('.loader');
    const input = document.querySelector('.inputbox');


    // ---------------- LOADER ----------------
    function syncLoader(state){
        if (state === 'pending') {
            loader.style.backgroundColor = 'red';
        } else {
            loader.style.backgroundColor = 'transparent';
        }
    }


    // ---------------- MOCK API ----------------
    function fetchApi(q, signal){

        if(q === '') return;

        syncLoader('pending');

        return new Promise((resolve, reject)=>{

            console.log("API called with:", q);

            // ❗ If already aborted
            if (signal.aborted) {
                return reject(new Error("aborted"));
            }

            const timerId = setTimeout(() => {

                // ❗ Check again before finishing
                if (signal.aborted) {
                    return reject(new Error("aborted"));
                }

                const names = [
                    "Aarav","Vivaan","Aditya","Vihaan","Arjun",
                    "Sai","Reyansh","Krishna","Ishan","Shaurya",
                    "Atharv","Dhruv","Kabir","Rohan","Aryan",
                    "Yash","Kunal","Harsh","Manav","Dev",
                    "Rudra","Aniket","Varun","Samar","Ayaan",
                    "Nikhil","Parth","Om","Shivansh","Tanay",
                    "Laksh","Vedant","Pranav","Rishabh","Aryav"
                ];

                const results = names
                    .map(n => n.toLowerCase())
                    .filter(n => n.includes(q));

                console.log(results);

                resolve(results);

            }, Math.floor(Math.random() * 3000));

            // ❗ REAL abort logic
            signal.addEventListener("abort", () => {
                clearTimeout(timerId);
                reject(new Error("aborted"));
                console.log("Request cancelled");
            });

        })
        .then(() => {
            loadingState = 'resolved';
            syncLoader('resolved');
        })
        .catch((e) => {
            if (e.message !== "aborted") {
                loadingState = 'error';
            }
        });
    }


    // ---------------- DEBOUNCE ----------------
    function debouncer(query){

        // clear previous debounce timer
        clearTimeout(debounceTimer);

        debounceTimer = setTimeout(async () => {

            // ❗ cancel previous request
            if (currentController) {
                currentController.abort();
            }

            // ❗ create new controller
            currentController = new AbortController();

            try {
                await fetchApi(query, currentController.signal);
                console.log(loadingState);
            } catch (e) {
                // already handled inside fetchApi
            }

        }, 400);
    }


    // ---------------- EVENT ----------------
    input.addEventListener('input', () => {
        debouncer(input.value.toLowerCase());
    });

</script>

</body>
</html>
